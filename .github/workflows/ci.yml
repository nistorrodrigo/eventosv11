name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --pretty 2>/dev/null || true
        # Non-blocking: gradual TS migration, some files still .jsx

      - name: Unit tests
        run: npx vitest run --reporter=verbose

      - name: Build
        run: npm run build

      - name: Build size check
        run: |
          echo "## Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh dist/assets/*.js | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          TOTAL=$(du -sh dist/assets/*.js | tail -1 | awk '{print $1}')
          echo "**Total JS:** $TOTAL" >> $GITHUB_STEP_SUMMARY
